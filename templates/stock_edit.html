<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Produto</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; max-width: 720px; }
    label { display: block; margin-top: 10px; font-weight: 600; }
    input { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 16px; padding: 10px 14px; }
    a { color: #0a58ca; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Editar Produto</h1>
  <form method="post">
    <label for="code">Código</label>
    <input id="code" name="code" value="{{ product.code or '' }}">

    <label for="name">Nome</label>
    <input id="name" name="name" value="{{ product.name }}" required>

    <label for="quantity">Quantidade</label>
    <input id="quantity" name="quantity" type="number" min="0" value="{{ product.quantity }}" required>

    <label for="purchase_price">Preço de compra</label>
    <input id="purchase_price" name="purchase_price" type="number" step="0.01" value="{{ product.purchase_price }}" required>

    <label for="sale_price">Preço de venda</label>
    <input id="sale_price" name="sale_price" type="number" step="0.01" value="{{ product.sale_price }}" required>

    <button type="submit">Salvar</button>
  </form>
  <p><a href="{{ url_for('products') }}">Voltar</a></p>
</body>
</html>
