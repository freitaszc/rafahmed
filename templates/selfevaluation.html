<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoavaliações</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 100%; max-width: 680px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    .actions { margin-top: 14px; }
    a { color: #0a58ca; text-decoration: none; }
    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #0a58ca;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <h1>Resumo de Autoavaliações</h1>
  <table>
    <thead>
      <tr>
        <th>Dia</th>
        <th>Quantidade</th>
      </tr>
    </thead>
    <tbody>
      {% for i in range(labels|length) %}
      <tr>
        <td>{{ labels[i] }}</td>
        <td>{{ values[i] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <div class="actions">
    <a href="{{ url_for('quiz_results') }}">Ver resultados detalhados</a>
    <br>
    <a href="{{ url_for('download_quiz_results_report') }}" class="btn">Baixar PDF</a>
  </div>
</body>
</html>
